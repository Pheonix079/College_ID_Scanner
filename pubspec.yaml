name: dronacharya_student_verification
description: "Dronacharya Student Verification — Student ID Scanner & Verification"

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ">=3.0.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  mobile_scanner: ^5.0.0
  sqflite: ^2.3.2
  sqflite_common_ffi: ^2.3.3
  path: ^1.9.0
  path_provider: ^2.1.2
  http: ^1.2.0
  shared_preferences: ^2.2.2
  intl: ^0.19.0
  csv: ^5.0.2
  flutter_secure_storage: ^9.2.2
  dio: ^5.4.0 # Added missing dependency required by sync_service.dart

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  # Updated to look at the root assets folder instead of lib/assets
  assets:
    - assets/